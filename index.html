<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyVault Pro | Tamim Sarkar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: rgba(255,255,255,0.05); --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #app-shell { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        aside { background: rgba(15,23,42,0.9); border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        nav li { list-style: none; padding: 12px; border-radius: 10px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        nav li:hover, nav li.active { background: var(--primary); color: white; }
        main { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .file-card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .file-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .file-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .btn-auth { background: white; color: black; padding: 12px 25px; border-radius: 12px; font-weight: 600; border: none; cursor: pointer; }
        #auth-screen { position: fixed; inset: 0; background: #0f172a; z-index: 2000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="auth-screen">
        <div>
            <h1 style="font-size: 3rem; margin-bottom: 10px;">MyVault</h1>
            <p style="color: #94a3b8; margin-bottom: 30px;">Please login and <b>check all permission boxes</b> to see files.</p>
            <button class="btn-auth" onclick="handleLogin()">Sign in with Google</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-shell" class="hidden">
        <aside>
            <div class="logo"><i data-lucide="shield-check"></i> MyVault</div>
            <nav>
                <li class="active" onclick="loadFiles()"><i data-lucide="folder"></i> All Files</li>
                <li onclick="logout()" style="color: #ef4444; margin-top: auto;"><i data-lucide="log-out"></i> Logout</li>
            </nav>
        </aside>
        <main>
            <h2 id="title" style="margin-bottom: 20px;">Your Drive Files</h2>
            <div id="display" class="file-grid"></div>
        </main>
    </div>

    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <script>
        const CLIENT_ID = '660229678534-7fpjbdrinr2moi8m5fn90poot5livg95.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyC3W_BY2TEvFTC6hcVVGpoAHaDkh7tAEX0';
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/photoslibrary.readonly';

        let tokenClient;

        function initApp() {
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
                if (localStorage.getItem('token')) {
                    gapi.client.setToken({ access_token: localStorage.getItem('token') });
                    showDashboard();
                }
            });

            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (resp) => {
                    if (resp.access_token) {
                        localStorage.setItem('token', resp.access_token);
                        showDashboard();
                    }
                }
            });
            lucide.createIcons();
        }

        function handleLogin() {
            tokenClient.requestAccessToken({ prompt: 'consent' });
        }

        function showDashboard() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            loadFiles();
        }

        async function loadFiles() {
            const display = document.getElementById('display');
            display.innerHTML = 'Loading...';
            
            try {
                const res = await gapi.client.drive.files.list({
                    fields: 'files(id, name, mimeType, thumbnailLink, webViewLink)'
                });
                const files = res.result.files;

                if (!files || files.length === 0) {
                    display.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                            <p>No files found. Did you check all boxes during login?</p>
                            <button onclick="handleLogin()" style="margin-top:10px;">Retry Login & Check Boxes</button>
                        </div>`;
                    return;
                }

                display.innerHTML = files.map(file => `
                    <div class="file-card" onclick="window.open('${file.webViewLink}', '_blank')">
                        ${file.thumbnailLink ? `<img src="${file.thumbnailLink}">` : `<i data-lucide="file" size="40"></i>`}
                        <div style="font-size: 0.8rem; margin-top:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${file.name}</div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                display.innerHTML = "Error loading files. Try logging in again.";
            }
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        window.onload = initApp;
    </script>
</body>
</html>
