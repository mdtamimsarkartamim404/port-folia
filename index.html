<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyVault Pro | Internal Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #6366f1; --bg: #0b0f1a; --card: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --text: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        .hidden { display: none !important; }

        /* --- UI LAYOUT --- */
        #app-shell { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        aside { background: rgba(15, 23, 42, 0.95); border-right: 1px solid var(--border); padding: 2rem 1.5rem; display: flex; flex-direction: column; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); display: flex; gap: 10px; margin-bottom: 2.5rem; align-items: center; }
        nav ul { list-style: none; }
        nav li { padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: 0.3s; }
        nav li.active, nav li:hover { background: var(--card); color: white; border: 1px solid var(--border); }
        nav li.active { color: var(--primary); border-color: var(--primary); }

        main { display: flex; flex-direction: column; overflow: hidden; position: relative; }
        header { padding: 1.2rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(11, 15, 26, 0.5); }

        .content-area { padding: 2rem; overflow-y: auto; flex-grow: 1; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.2rem; }
        .file-card { background: var(--card); padding: 10px; border-radius: 15px; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; text-align: center; }
        .file-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .file-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; background: #1e293b; }
        .file-name { font-size: 0.75rem; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- INTERNAL VIEWER MODAL --- */
        #viewer-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .viewer-container { width: 90%; height: 90%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .viewer-container iframe, .viewer-container img { width: 100%; height: 100%; border-radius: 12px; border: none; object-fit: contain; }
        .close-btn { position: absolute; top: -20px; right: -20px; color: white; cursor: pointer; background: var(--primary); border-radius: 50%; padding: 10px; border: none; z-index: 5001; }

        /* --- AUTH --- */
        #auth-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0b0f1a; z-index: 9999; }
        .login-card { background: var(--card); padding: 3rem; border-radius: 25px; border: 1px solid var(--border); text-align: center; width: 350px; }
        .btn-google { background: white; color: black; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-card">
            <h1>MyVault <span style="color:var(--primary)">Pro</span></h1>
            <p style="color:#94a3b8; font-size:0.9rem;">Private Multi-Account Dashboard</p>
            <button class="btn-google" onclick="login()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18">
                Sign in with Google
            </button>
        </div>
    </div>

    <div id="app-shell" class="hidden">
        <aside>
            <div class="logo"><i data-lucide="shield-check"></i> MyVault</div>
            <nav>
                <ul>
                    <li id="m-drive" class="active" onclick="changeTab('drive')"><i data-lucide="folder"></i> All Files</li>
                    <li id="m-photos" onclick="changeTab('photos')"><i data-lucide="image"></i> Google Photos</li>
                </ul>
            </nav>
            <div style="margin-top:auto;">
                <button onclick="login()" style="width:100%; background:var(--card); color:white; border:1px solid var(--border); padding:10px; border-radius:10px; cursor:pointer; margin-bottom:10px;">+ Add Account</button>
                <button onclick="logout()" style="color:#ef4444; background:none; border:none; cursor:pointer; display:flex; gap:10px;"><i data-lucide="log-out"></i> Logout</button>
            </div>
        </aside>

        <main>
            <header>
                <h2 id="view-title">All Files</h2>
                <div id="user-info" style="font-size:0.8rem; color:#94a3b8;"></div>
            </header>
            <div class="content-area">
                <div class="file-grid" id="main-grid"></div>
            </div>
        </main>
    </div>

    <div id="viewer-modal" class="hidden">
        <div class="viewer-container">
            <button class="close-btn" onclick="closeViewer()"><i data-lucide="x"></i></button>
            <div id="viewer-content" style="width:100%; height:100%;"></div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <script>
        const CLIENT_ID = '660229678534-7fpjbdrinr2moi8m5fn90poot5livg95.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyC3W_BY2TEvFTC6hcVVGpoAHaDkh7tAEX0';
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/photoslibrary.readonly';

        let tokenClient;
        let accessToken = localStorage.getItem('vault_token');

        function init() {
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
                if (accessToken) {
                    gapi.client.setToken({ access_token: accessToken });
                    startApp();
                }
            });
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES,
                callback: (resp) => {
                    if (resp.access_token) {
                        accessToken = resp.access_token;
                        localStorage.setItem('vault_token', accessToken);
                        startApp();
                    }
                }
            });
            lucide.createIcons();
        }

        function login() { tokenClient.requestAccessToken({ prompt: 'select_account consent' }); }
        function logout() { localStorage.removeItem('vault_token'); location.reload(); }

        function startApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            changeTab('drive');
        }

        async function changeTab(type) {
            const grid = document.getElementById('main-grid');
            document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
            document.getElementById('m-' + type).classList.add('active');
            grid.innerHTML = "Loading...";

            if (type === 'drive') {
                const res = await gapi.client.drive.files.list({ fields: 'files(id, name, mimeType, thumbnailLink)' });
                render(res.result.files || [], 'drive');
            } else {
                try {
                    const res = await fetch('https://photoslibrary.googleapis.com/v1/mediaItems?pageSize=100', {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    const data = await res.json();
                    render(data.mediaItems ? data.mediaItems.map(p => ({ id: p.id, name: p.filename, mimeType: p.mimeType, thumbnailLink: p.baseUrl + '=w500', fullRes: p.baseUrl + '=w2048' })) : [], 'photos');
                } catch (e) { grid.innerHTML = "Permission denied for Photos."; }
            }
            lucide.createIcons();
        }

        function render(items, source) {
            const grid = document.getElementById('main-grid');
            if (items.length === 0) { grid.innerHTML = "No files found. Did you check all boxes during login?"; return; }
            grid.innerHTML = items.map(item => `
                <div class="file-card" onclick="openInternal('${item.id}', '${item.mimeType}', '${item.fullRes || ''}')">
                    <img src="${item.thumbnailLink || 'https://cdn-icons-png.flaticon.com/512/3767/3767084.png'}" loading="lazy">
                    <div class="file-name">${item.name}</div>
                </div>
            `).join('');
        }

        function openInternal(id, mime, photoUrl) {
            const modal = document.getElementById('viewer-modal');
            const content = document.getElementById('viewer-content');
            modal.classList.remove('hidden');

            if (photoUrl) { // গুগল ফটোসের জন্য
                content.innerHTML = `<img src="${photoUrl}">`;
            } else { // গুগল ড্রাইভের ফাইলের জন্য (PDF, Video, Image)
                content.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview"></iframe>`;
            }
        }

        function closeViewer() { document.getElementById('viewer-modal').classList.add('hidden'); document.getElementById('viewer-content').innerHTML = ''; }

        window.onload = init;
    </script>
</body>
</html>
