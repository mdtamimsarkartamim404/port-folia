<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyVault Pro | Private Cloud Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0b0f1a;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        .hidden { display: none !important; }

        /* --- LAYOUT --- */
        #app-shell { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        
        aside {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); padding: 2rem 1.5rem;
            display: flex; flex-direction: column;
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; margin-bottom: 2.5rem; }
        
        nav ul { list-style: none; }
        nav li {
            padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; cursor: pointer;
            display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: 0.3s;
        }
        nav li.active, nav li:hover { background: var(--card); color: white; }
        nav li.active { color: var(--primary); border: 1px solid var(--primary); }

        main { display: flex; flex-direction: column; overflow: hidden; position: relative; }
        header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        .content-area { padding: 2rem; overflow-y: auto; flex-grow: 1; }

        /* --- FILE GRID --- */
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.2rem; }
        .file-card {
            background: var(--card); padding: 10px; border-radius: 15px; border: 1px solid var(--border);
            transition: 0.3s; cursor: pointer; text-align: center;
        }
        .file-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .file-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; background: #1e293b; }
        .file-name { font-size: 0.75rem; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- INTERNAL VIEWER MODAL --- */
        #viewer-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 5000; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(15px); padding: 20px;
        }
        .viewer-container { max-width: 1000px; width: 100%; position: relative; text-align: center; }
        .viewer-container img, .viewer-container video { max-width: 100%; max-height: 80vh; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: -50px; right: 0; color: white; cursor: pointer; background: var(--primary); border-radius: 50%; padding: 8px; border: none; }

        /* --- LOGIN SCREEN --- */
        #auth-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0b0f1a; z-index: 9999; }
        .login-card { background: var(--card); padding: 3rem; border-radius: 25px; border: 1px solid var(--border); text-align: center; width: 350px; }
        .btn-google { background: white; color: black; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; margin-top: 20px; }

    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="auth-screen">
        <div class="login-card">
            <h1 style="margin-bottom:10px;">MyVault Pro</h1>
            <p style="color:#94a3b8; font-size:0.9rem;">Sign in to access your Private Library</p>
            <button class="btn-google" onclick="login()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18">
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-shell" class="hidden">
        <aside>
            <div class="logo"><i data-lucide="shield-check"></i> MyVault</div>
            <nav>
                <ul>
                    <li id="menu-drive" class="active" onclick="changeSection('drive')"><i data-lucide="folder"></i> All Files</li>
                    <li id="menu-photos" onclick="changeSection('photos')"><i data-lucide="image"></i> Google Photos</li>
                </ul>
            </nav>
            <div style="margin-top:auto;">
                <button onclick="login()" style="width:100%; background:var(--card); color:white; border:1px solid var(--border); padding:10px; border-radius:10px; cursor:pointer; margin-bottom:10px;">Switch Account</button>
                <button onclick="logout()" style="color:#ef4444; background:none; border:none; cursor:pointer; display:flex; gap:10px;"><i data-lucide="log-out"></i> Logout</button>
            </div>
        </aside>

        <main>
            <header>
                <h2 id="view-title">All Files</h2>
                <div id="status-info" style="font-size:0.8rem; color:#94a3b8;"></div>
            </header>
            <div class="content-area">
                <div class="file-grid" id="main-grid"></div>
            </div>
        </main>
    </div>

    <!-- INTERNAL VIEWER -->
    <div id="viewer-modal" class="hidden">
        <div class="viewer-container">
            <button class="close-btn" onclick="closeViewer()"><i data-lucide="x"></i></button>
            <div id="media-content"></div>
            <p id="media-name" style="margin-top:15px; font-weight:600;"></p>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <script>
        const CLIENT_ID = '660229678534-7fpjbdrinr2moi8m5fn90poot5livg95.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyC3W_BY2TEvFTC6hcVVGpoAHaDkh7tAEX0';
        // সব পারমিশন একসাথে রিকোয়েস্ট করা হচ্ছে
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/photoslibrary.readonly';

        let tokenClient;
        let accessToken = localStorage.getItem('v_token');

        function init() {
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
                if (accessToken) {
                    gapi.client.setToken({ access_token: accessToken });
                    startApp();
                }
            });

            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (resp) => {
                    if (resp.access_token) {
                        accessToken = resp.access_token;
                        localStorage.setItem('v_token', accessToken);
                        startApp();
                    }
                },
            });
            lucide.createIcons();
        }

        function login() { tokenClient.requestAccessToken({ prompt: 'select_account' }); }
        function logout() { localStorage.removeItem('v_token'); location.reload(); }

        function startApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            changeSection('drive');
        }

        async function changeSection(type) {
            const grid = document.getElementById('main-grid');
            const title = document.getElementById('view-title');
            
            document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
            document.getElementById('menu-' + type).classList.add('active');
            
            grid.innerHTML = "Loading your library...";
            title.innerText = type === 'drive' ? "All Drive Files" : "Google Photos Library";

            if (type === 'drive') await fetchDrive();
            else await fetchPhotos();
            lucide.createIcons();
        }

        async function fetchDrive() {
            const res = await gapi.client.drive.files.list({ fields: 'files(id, name, mimeType, thumbnailLink, webViewLink)' });
            render(res.result.files || []);
        }

        async function fetchPhotos() {
            try {
                // সরাসরি REST API কল করা হচ্ছে গুগল ফটোসের জন্য
                const res = await fetch('https://photoslibrary.googleapis.com/v1/mediaItems?pageSize=100', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await res.json();
                if (data.mediaItems) {
                    render(data.mediaItems.map(p => ({
                        id: p.id, name: p.filename, mimeType: p.mimeType, 
                        thumbnailLink: p.baseUrl + '=w500-h500', 
                        fullRes: p.baseUrl + '=w2048-h2048' // বড় ছবির জন্য
                    })));
                } else {
                    document.getElementById('main-grid').innerHTML = "No photos found or Permission not granted.";
                }
            } catch (e) { document.getElementById('main-grid').innerHTML = "Google Photos Connection Error."; }
        }

        function render(items) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = items.map(item => {
                const thumb = item.thumbnailLink || 'https://cdn-icons-png.flaticon.com/512/3767/3767084.png';
                const isImg = item.mimeType?.includes('image');
                // ভিউয়ারে পাঠানোর জন্য ডাটা
                const openData = JSON.stringify({ name: item.name, url: item.fullRes || item.thumbnailLink?.replace('=s220', '=s1200'), type: item.mimeType });

                return `
                    <div class="file-card" onclick='openViewer(${openData})'>
                        <img src="${thumb.replace('=s220', '=s400')}" loading="lazy">
                        <div class="file-name">${item.name}</div>
                    </div>
                `;
            }).join('');
        }

        // --- INTERNAL VIEWER ---
        function openViewer(data) {
            const modal = document.getElementById('viewer-modal');
            const content = document.getElementById('media-content');
            modal.classList.remove('hidden');
            document.getElementById('media-name').innerText = data.name;

            if (data.type?.includes('image')) {
                content.innerHTML = `<img src="${data.url}">`;
            } else {
                content.innerHTML = `<div style="padding:50px;"><i data-lucide="file" size="64"></i><p style="margin-top:20px;">Preview not supported for this file.</p></div>`;
                lucide.createIcons();
            }
        }

        function closeViewer() { document.getElementById('viewer-modal').classList.add('hidden'); }

        window.onload = init;
    </script>
</body>
</html>
